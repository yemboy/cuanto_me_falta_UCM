name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Sintaxis JS + checks de CSP
        run: bash scripts/check.sh

      - name: Tests
        run: bun test
